{% extends 'base.html' %}
{% block title %}
    My Account
{% endblock %}
{% block account_active %}active{% endblock %}
{% block body %}

    <h2>My Account</h2>
    <hr>

    <form method="post" action="{% url 'user:account' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input autofocus type="text" class="form-control" id="name" name="name" value="{{ request.user.name }}">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ request.user.email }}">
        </div>
        <button type="submit" class="btn btn-primary">Update Account</button>
    </form>

    <br>

    <h3>Change Password</h3>
    <hr>
    <form method="post" action="{% url 'user:password' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label for="current_password" class="form-label">Current Password</label>
            <input type="password" class="form-control" id="current_password" name="current_password" required>
        </div>
        <div class="mb-3">
            <label for="new_password" class="form-label">New Password</label>
            <input type="password" class="form-control" id="new_password" name="new_password" required>
        </div>
        <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn btn-primary">Change Password</button>
    </form>

{% endblock %}
