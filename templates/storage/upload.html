{% extends 'base.html' %}
{% block title %}
	Upload
{% endblock %}
{% block upload_active %}active{% endblock %}
{% block body %}
    <h2>Upload Files</h2>
    <hr>
    <form method="post" action="{% url 'storage:upload' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3 row">
            <label for="file" class="col-sm-2 col-form-label">Select File</label>
            <div class="col-sm-10">
                <input type="file" class="form-control" id="file" name="file" required>
            </div>
        </div>
        <div class="mb-3 row">
            <div class="col-sm-10 offset-sm-2">
                <button type="submit" class="btn btn-primary">Upload</button>
            </div>
        </div>
    </form>
{% endblock %}
